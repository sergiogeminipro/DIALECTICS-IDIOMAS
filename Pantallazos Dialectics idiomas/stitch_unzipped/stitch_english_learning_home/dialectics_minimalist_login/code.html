<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dialectics Minimalist Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6467f2",
                        "background-light": "#ffffff",
                        "background-dark": "#101122",
                        "slate-custom": "#f8fafc",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .letter-spacing-widest {
            letter-spacing: 0.2em;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-center p-6">
<!-- Container for the login experience -->
<div class="w-full max-w-[400px] flex flex-col items-center">
<!-- Header Logo Section -->
<div class="flex flex-col items-center mb-12">
<div class="flex items-center gap-1 mb-2">
<span class="text-primary material-symbols-outlined" style="font-size: 10px; font-variation-settings: 'FILL' 1;">
                    circle
                </span>
<h1 class="text-slate-900 dark:text-slate-100 text-xs font-bold letter-spacing-widest uppercase">
                    Dialectics IA Idioms
                </h1>
</div>
<p class="text-slate-400 dark:text-slate-500 text-[10px] uppercase tracking-[0.3em]">Premium Learning Experience</p>
</div>
<!-- Login Card -->
<div class="w-full bg-white dark:bg-slate-900/50 rounded-xl p-8 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 dark:border-slate-800">
<!-- Tabs Navigation -->
<div class="flex p-1 bg-slate-custom dark:bg-slate-800/50 rounded-full mb-8">
<button class="flex-1 py-2 text-sm font-semibold rounded-full bg-white dark:bg-slate-700 text-slate-900 dark:text-white shadow-sm transition-all">
                    Acceso
                </button>
<button class="flex-1 py-2 text-sm font-medium rounded-full text-slate-500 dark:text-slate-400 hover:text-slate-700 transition-all">
                    Registro
                </button>
</div>
<!-- Login Form -->
<form class="space-y-5" onsubmit="return false;">
<div class="space-y-1.5">
<label class="text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase ml-4 tracking-wider">Email</label>
<input class="w-full h-14 bg-slate-custom dark:bg-slate-800 border-none rounded-full px-6 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 transition-all" placeholder="hola@dialectics.ai" type="email"/>
</div>
<div class="space-y-1.5">
<div class="flex justify-between items-center px-4">
<label class="text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Contraseña</label>
</div>
<div class="relative">
<input class="w-full h-14 bg-slate-custom dark:bg-slate-800 border-none rounded-full px-6 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<div class="flex justify-end px-2">
<a class="text-[12px] font-medium text-primary hover:text-primary/80 transition-colors" href="#">¿Olvidaste tu contraseña?</a>
</div>
<button class="w-full h-14 bg-primary text-white font-semibold rounded-full shadow-lg shadow-primary/20 hover:bg-primary/90 hover:scale-[0.99] active:scale-95 transition-all mt-4">
                    Entrar
                </button>
</form>
<!-- Divider -->
<div class="relative my-10">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-100 dark:border-slate-800"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-white dark:bg-slate-900 px-4 text-slate-400 tracking-widest">O continuar con</span>
</div>
</div>
<!-- Social Login -->
<button class="w-full h-14 flex items-center justify-center gap-3 bg-white dark:bg-transparent border border-slate-200 dark:border-slate-700 rounded-full hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">
<svg height="20" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-semibold text-slate-700 dark:text-slate-200">Google</span>
</button>
</div>
<!-- Footer Help -->
<p class="mt-8 text-xs text-slate-400 dark:text-slate-500 text-center">
            ¿No tienes una cuenta? <a class="text-primary font-semibold" href="#">Crea una ahora</a>
</p>
</div>
<!-- Bottom Navigation Bar for iOS feel -->
<div class="fixed bottom-0 left-0 right-0 flex justify-center pb-8 px-6 bg-gradient-to-t from-background-light via-background-light to-transparent dark:from-background-dark dark:via-background-dark pointer-events-none">
<div class="flex items-center gap-8 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl px-10 py-4 rounded-full border border-slate-100 dark:border-slate-800 shadow-xl pointer-events-auto">
<a class="text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
</a>
<a class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors" href="#">
<span class="material-symbols-outlined">search</span>
</a>
<a class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
</a>
</div>
</div>
</body></html>
